name: Release APK + Windows MSI

# Cuts a GitHub release whenever a `v*.*.*` tag is pushed.
# Two jobs in parallel:
#   - apk:    Ubuntu runner, signs with the hexhoxhex keystore.
#   - msi:    Windows runner, packages the :desktop module via
#             Compose's nativeDistributions packager. Unsigned for now
#             (Windows will SmartScreen-warn on first launch; user
#             clicks "More info" → "Run anyway" once).
# Both attach their artifact to the same GitHub release for the tag.
# Mac .dmg is a planned future job once we add a macOS runner step.

on:
  push:
    tags:
      - 'v*.*.*'
  # Allow manual re-run from the Actions tab if the tag-trigger build
  # failed before the upload step.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.20). Must already exist.'
        required: true

permissions:
  # `softprops/action-gh-release` needs contents:write to create the
  # release and upload assets via the per-job GITHUB_TOKEN.
  contents: write

env:
  # Silence the "Node.js 20 actions deprecated" warning. setup-java@v4
  # and setup-gradle@v4 still ship a node20 binary; this opts them into
  # node24 ahead of the June 16 2026 hard cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore + write local.properties
        env:
          KEYSTORE_B64: ${{ secrets.HEXHOXHEX_KEYSTORE_B64 }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::HEXHOXHEX_KEYSTORE_B64 secret is empty"
            exit 1
          fi
          if [ -z "$TMDB_TOKEN" ]; then
            echo "::error::TMDB_TOKEN secret is empty — runtime would 401 on TMDB calls"
            exit 1
          fi
          mkdir -p "$HOME/.hexhoxhex"
          echo "$KEYSTORE_B64" | base64 -d > "$HOME/.hexhoxhex/release.jks"
          # Pass paths + tokens through to gradle via the same local.properties
          # mechanism the local build uses. local.properties is gitignored
          # so this is throwaway scratch in the runner.
          #
          # TMDB_TOKEN ends up in BuildConfig at compile time via
          # app/build.gradle.kts buildConfigField. Without it the
          # Retrofit calls to api.themoviedb.org return 401 and the app
          # can't render any movie metadata — that was the user's
          # "github-built APK shows 401" report.
          cat > local.properties <<EOF
          HEXHOXHEX_KEYSTORE=$HOME/.hexhoxhex/release.jks
          HEXHOXHEX_STORE_PASS=${{ secrets.HEXHOXHEX_STORE_PASS }}
          HEXHOXHEX_KEY_ALIAS=${{ secrets.HEXHOXHEX_KEY_ALIAS }}
          HEXHOXHEX_KEY_PASS=${{ secrets.HEXHOXHEX_KEY_PASS }}
          TMDB_TOKEN=${TMDB_TOKEN}
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK to include version
        id: apk
        run: |
          src=app/build/outputs/apk/release/app-release.apk
          dst="vijanabarubaru-${{ steps.tag.outputs.tag }}.apk"
          cp "$src" "$dst"
          echo "path=$dst" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$dst" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.apk.outputs.path }}
          body: |
            Sideload APK signed with the hexhoxhex release key.

            **SHA-256:** `${{ steps.apk.outputs.sha256 }}`

            Install on a TV / phone:
            ```
            adb install -r vijanabarubaru-${{ steps.tag.outputs.tag }}.apk
            ```

  msi:
    # Windows desktop installer. Depends on the apk job so the release
    # already exists when this attaches the MSI — avoids the race where
    # both softprops/action-gh-release calls try to CREATE the release
    # at the same time and one fails. Sequential adds ~3 min to the
    # total release time; acceptable for safety. Mac .dmg job will
    # mirror this shape once we add a macos-latest runner step.
    needs: [apk]
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows MSI
        shell: bash
        # packageMsi runs Compose Desktop's nativeDistributions packager,
        # which calls jpackage under the hood. Output: a Windows .msi
        # installer that drops the app into Program Files with a Start
        # menu shortcut.
        run: ./gradlew :desktop:packageMsi --no-daemon --stacktrace

      - name: Rename MSI to include version
        id: msi
        shell: bash
        run: |
          src=$(ls desktop/build/compose/binaries/main/msi/*.msi | head -1)
          dst="vijanabarubaru-${{ steps.tag.outputs.tag }}.msi"
          cp "$src" "$dst"
          echo "path=$dst" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$dst" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Attach MSI to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: true
          # append_body: don't overwrite the APK section the apk job
          # posted — append our MSI section below it. Same release,
          # both assets visible, both checksums in the notes.
          append_body: true
          files: ${{ steps.msi.outputs.path }}
          body: |
            Windows desktop installer (.msi).

            **SHA-256:** `${{ steps.msi.outputs.sha256 }}`

            Install: double-click the MSI. Windows SmartScreen may warn
            ("Windows protected your PC") because the build isn't
            code-signed yet — click *More info* → *Run anyway* once.

            **Requirement**: VLC media player (videolan.org). libvlc
            isn't bundled in the v1 MSI; tomorrow's build will include
            it so this step goes away.
